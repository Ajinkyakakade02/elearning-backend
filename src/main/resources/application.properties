# ============================================
# SERVER CONFIGURATION
# ============================================
server.port=${SERVER_PORT:8080}

# ============================================
# DATABASE CONFIGURATION (MySQL)
# ============================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/elearning_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:@jinkya}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA/HIBERNATE CONFIGURATION
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# JWT CONFIGURATION
# ============================================
jwt.secret=${JWT_SECRET:mySuperSecretKeyForJWTTokenGenerationAndValidationThatIsAtLeastSixtyFourCharactersLong2025!}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ============================================
# LOGGING
# ============================================
logging.level.org.springframework.security=INFO
logging.level.com.elearning=INFO
logging.file.name=logs/elearning.log

# ============================================
# PRICING CONFIGURATION
# ============================================
app.pricing.course.default=99.00
app.pricing.quiz.default=99.00
app.pricing.currency=?
app.pricing.suffix=/-

