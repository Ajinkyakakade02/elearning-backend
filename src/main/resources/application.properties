# ============================================
# SERVER CONFIGURATION
# ============================================
server.port=${PORT:8080}

# ============================================
# DATABASE CONFIGURATION (MySQL) - Using Env Vars
# ============================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA/HIBERNATE CONFIGURATION
# ============================================
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}

# ============================================
# JWT CONFIGURATION - Using Env Vars
# ============================================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ============================================
# LOGGING - Production ready
# ============================================
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:INFO}
logging.level.com.elearning=${LOG_LEVEL_APP:INFO}
logging.file.name=${LOG_FILE:logs/elearning.log}
logging.file.max-size=${LOG_MAX_SIZE:10MB}
logging.file.max-history=${LOG_MAX_HISTORY:30}

# ============================================
# PRICING CONFIGURATION
# ============================================
app.pricing.course.default=${PRICING_COURSE:99.00}
app.pricing.quiz.default=${PRICING_QUIZ:99.00}
app.pricing.currency=${PRICING_CURRENCY:?}
app.pricing.suffix=${PRICING_SUFFIX:/-}

# ============================================
# CORS CONFIGURATION
# ============================================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ============================================
# EMAIL CONFIGURATION - Using Env Vars
# ============================================
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${MAIL_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_TIMEOUT:5000}