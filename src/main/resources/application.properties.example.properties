# ============================================
# EXAMPLE CONFIGURATION - Copy to application.properties
# ============================================

# Server
server.port=8080

# Database (REQUIRED - set these in your environment)
DB_URL=jdbc:mysql://localhost:3306/elearning_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
DB_USERNAME=root
DB_PASSWORD=your_password_here

# JWT (REQUIRED - set this in your environment)
JWT_SECRET=your_super_secret_jwt_key_at_least_64_chars_long_here

# Optional overrides
JWT_EXPIRATION=86400000
JPA_DDL_AUTO=update
JPA_SHOW_SQL=false
CORS_ALLOWED_ORIGINS=http://localhost:3000

# Email (optional - for password reset)
MAIL_HOST=smtp.gmail.com
MAIL_PORT=587
MAIL_USERNAME=your_email@gmail.com
MAIL_PASSWORD=your_app_password